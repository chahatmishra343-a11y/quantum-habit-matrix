<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ROYAL MATRIX // CONSOLE</title>
    <style>
        /* LUXURY LIGHT DESIGN SYSTEM */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #fffdf9;
            color: #475569;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* REGAL SIDEBAR NAVIGATION */
        .sidebar {
            width: 290px;
            background: #ffffff;
            border-right: 1px solid #f3ece3;
            display: flex;
            flex-direction: column;
            padding: 45px 24px;
            justify-content: space-between;
        }

        .brand-section h1 {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            outline: none;
            padding: 4px;
            border-radius: 4px;
        }

        .brand-section p {
            font-size: 11px;
            color: #b4a28d;
            letter-spacing: 0.5px;
            margin-top: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 45px;
            flex-grow: 1;
        }

        .nav-item {
            padding: 12px 14px;
            color: #78879a;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-item:hover, .nav-item.active {
            color: #1e293b;
            background: #fbf9f4;
        }

        .nav-item.active {
            color: #c5a059;
            background: #fdfbf7;
            font-weight: 700;
            border-left: 2px solid #c5a059;
            border-radius: 0 6px 6px 0;
        }

        /* VIEWPORT STRUCTURE */
        .main-content {
            flex-grow: 1;
            padding: 60px 80px;
            overflow-y: auto;
        }

        .header-title {
            font-size: 26px;
            font-weight: 400;
            color: #1e293b;
            letter-spacing: -0.5px;
            margin-bottom: 40px;
        }

        /* HABIT EXECUTION MATRIX ROWS */
        .matrix-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            margin-top: -10px;
        }

        .matrix-table th {
            padding: 10px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* FLUID TRANSFORM LAYERS */
        .matrix-row {
            background: #ffffff;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease, box-shadow 0.4s ease;
            box-shadow: 0 2px 10px rgba(197, 160, 89, 0.01);
        }

        .matrix-row:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(197, 160, 89, 0.04);
        }

        .matrix-row.completed-transform {
            opacity: 0.45;
            transform: scale(0.985);
            box-shadow: none;
        }

        .matrix-row.completed-transform .editable-field {
            color: #c5a059;
            font-style: italic;
        }

        .matrix-row td {
            padding: 16px 20px;
            border-top: 1px solid #f5efe6;
            border-bottom: 1px solid #f5efe6;
        }

        .matrix-row td:first-child {
            border-left: 1px solid #f5efe6;
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }

        .matrix-row td:last-child {
            border-right: 1px solid #f5efe6;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        .editable-field {
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            width: 100%;
            padding: 6px;
            border-radius: 4px;
            transition: color 0.3s ease;
        }

        .editable-field:focus {
            background: #fbf9f4;
            outline: none;
        }

        /* INTERACTIVE CHAMPAGNE CHECK BUTTONS */
        .check-btn {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #64748b;
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .check-btn:hover {
            border-color: #c5a059;
            color: #c5a059;
        }

        .check-btn.checked {
            background: #fdfbf6;
            border-color: #c5a059;
            color: #c5a059;
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.12);
        }

        /* ACTION FOOTER LEDGER */
        .ledger-action-btn {
            margin-top: 35px;
            background: #c5a059;
            color: #ffffff;
            border: none;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(197, 160, 89, 0.15);
            transition: transform 0.2s;
        }

        .ledger-action-btn:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="brand-section">
                <h1 id="workspaceTitle" contenteditable="true" onblur="saveCustomTitle()">CHAHAT'S VAULT</h1>
                <p>Royal Minimalism // Matrix</p>
            </div>
            
            <div class="nav-links">
                <a href="index.html" class="nav-item active">✦ DAILY CONSOLE</a>
                <a href="archive.html" class="nav-item">✦ ARCHIVE MATRIX</a>
            </div>
        </div>
        
        <div style="font-size: 10px; color: #cbd5e1; font-weight: 700; letter-spacing: 0.5px;">SYSTEM MATRIX // 2026</div>
    </div>

    <div class="main-content">
        <div class="header-title">Daily Operations Matrix</div>
        
        <table class="matrix-table">
            <thead>
                <tr>
                    <th>Habit Coordinates (Editable fields)</th>
                    <th style="width: 160px; text-align: right;">Execution</th>
                </tr>
            </thead>
            <tbody id="habitTableContainer">
                </tbody>
        </table>
        
        <button class="ledger-action-btn" onclick="commitDayToLedger()">✦ Secure Today's Ledger Entry</button>
    </div>

    <script>
        // CLIENT DATABASE PLATFORM
        let defaultHabitSet = [
            "Grandmaster Chess Play Analysis",
            "Write 2 Scenes (Novel Project)",
            "Python Advanced Class Development",
            "Sololearn Coding Exercises",
            "Memorize Strategic Theories & Contexts",
            "Learn AI with ChatGPT Integration Protocols",
            "Early Wake Up at 5 AM",
            "Watch Technical/Academic Lectures",
            "Create Structured Concept Notes",
            "Drink Targeted Water Quota",
            "Track & Update Financial Platform Design",
            "Read Assigned Chapter Matrix Logs"
        ];

        // Read or build localized database state
        let ledger = JSON.parse(localStorage.getItem('quantum_royal_ledger')) || {
            habitNames: defaultHabitSet,
            currentChecks: new Array(defaultHabitSet.length).fill(false),
            monthlyLogs: {} // Stores year-wide data indexed by day counts
        };

        function mountMatrix() {
            const container = document.getElementById('habitTableContainer');
            container.innerHTML = "";

            ledger.habitNames.forEach((habit, idx) => {
                let row = document.createElement('tr');
                row.className = `matrix-row ${ledger.currentChecks[idx] ? 'completed-transform' : ''}`;
                
                row.innerHTML = `
                    <td>
                        <input class="editable-field" type="text" value="${habit}" onchange="editHabitLabel(${idx}, this.value)">
                    </td>
                    <td style="text-align: right;">
                        <button class="check-btn ${ledger.currentChecks[idx] ? 'checked' : ''}" onclick="toggleTargetCheck(${idx}, this)">
                            ${ledger.currentChecks[idx] ? 'COMPLETED' : 'LOG ACTIVITY'}
                        </button>
                    </td>
                `;
                container.appendChild(row);
            });
            localStorage.setItem('quantum_royal_ledger', JSON.stringify(ledger));
        }

        function toggleTargetCheck(idx, btn) {
            ledger.currentChecks[idx] = !ledger.currentChecks[idx];
            const row = btn.closest('tr');
            
            if(ledger.currentChecks[idx]) {
                btn.classList.add('checked');
                btn.innerText = 'COMPLETED';
                row.classList.add('completed-transform');
            } else {
                btn.classList.remove('checked');
                btn.innerText = 'LOG ACTIVITY';
                row.classList.remove('completed-transform');
            }
            localStorage.setItem('quantum_royal_ledger', JSON.stringify(ledger));
        }

        function editHabitLabel(idx, val) {
            ledger.habitNames[idx] = val;
            localStorage.setItem('quantum_royal_ledger', JSON.stringify(ledger));
        }

        function commitDayToLedger() {
            let done = ledger.currentChecks.filter(Boolean).length;
            let finalScore = Math.round((done / ledger.habitNames.length) * 100);
            
            // Calculate total global day count of current year to pin chronologically
            let now = new Date();
            let start = new Date(now.getFullYear(), 0, 0);
            let diff = now - start;
            let oneDay = 1000 * 60 * 60 * 24;
            let dayOfYearIndex = Math.floor(diff / oneDay);

            // Ask user for their optional entry note before wiping layout (routes to Chamber IV)
            let rawNote = prompt(`Today's Matrix Execution Score: ${finalScore}%.\nOptional: Transcribe your reflection journal text entry for today below:`);
            let finalizedNote = (rawNote && rawNote.trim()) ? rawNote.trim() : "Operational matrix secured.";

            // Save object securely into historical indices map
            ledger.monthlyLogs[dayOfYearIndex] = {
                score: finalScore,
                note: finalizedNote
            };

            // Reset active checklist boxes for next loop
            ledger.currentChecks = new Array(ledger.habitNames.length).fill(false);
            localStorage.setItem('quantum_royal_ledger', JSON.stringify(ledger));
            mountMatrix();

            alert("Entry encrypted and pushed into your Archive Vault.");
        }

        function saveCustomTitle() {
            localStorage.setItem('quantum_royal_title', document.getElementById('workspaceTitle').innerText);
        }
        document.getElementById('workspaceTitle').innerText = localStorage.getItem('quantum_royal_title') || "CHAHAT'S VAULT";

        mountMatrix();
    </script>
</body>
</html>
