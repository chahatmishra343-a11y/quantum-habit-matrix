<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ROYAL ARCHIVE // PROGRESSION</title>
    <style>
        /* LUXURY LIGHT DESIGN SYSTEM */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #fffdf9;
            color: #475569;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* REGAL SIDEBAR NAVIGATION */
        .sidebar {
            width: 290px;
            background: #ffffff;
            border-right: 1px solid #f3ece3;
            display: flex;
            flex-direction: column;
            padding: 45px 24px;
            justify-content: space-between;
        }

        .brand-section h1 {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .brand-section p {
            font-size: 11px;
            color: #b4a28d;
            letter-spacing: 0.5px;
            margin-top: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 45px;
            flex-grow: 1;
        }

        .nav-item {
            padding: 12px 14px;
            color: #78879a;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-item:hover, .nav-item.active {
            color: #1e293b;
            background: #fbf9f4;
        }

        .nav-item.active {
            color: #c5a059;
            background: #fdfbf7;
            font-weight: 700;
            border-left: 2px solid #c5a059;
            border-radius: 0 6px 6px 0;
        }

        .reset-btn {
            background: transparent;
            color: #ef4444;
            border: 1px dashed rgba(239, 68, 68, 0.4);
            padding: 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: #fef2f2;
            border-color: #ef4444;
        }

        /* VIEWPORT STRUCTURE */
        .main-content {
            flex-grow: 1;
            padding: 60px 80px;
            overflow-y: auto;
        }

        .header-title {
            font-size: 26px;
            font-weight: 400;
            color: #1e293b;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
        }

        /* MONTH SELECTION CHANNELS */
        .month-selector-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
            border-bottom: 1px solid #f5efe6;
            padding-bottom: 15px;
        }

        .month-tab {
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .month-tab:hover, .month-tab.active-month {
            color: #c5a059;
            background: #fdfbf6;
        }

        /* TWO COMPARTMENT SPLIT DATA DOCK */
        .vault-split-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            margin-bottom: 50px;
        }

        @media (min-width: 992px) {
            .vault-split-layout { grid-template-columns: 1.2fr 0.8fr; }
        }

        .surface-panel {
            background: #ffffff;
            border: 1px solid #f5efe6;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(197, 160, 89, 0.01);
        }

        .panel-meta-label {
            font-size: 11px;
            font-weight: 700;
            color: #b4a28d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        /* LOCALIZED MONTH DAY GRIDS */
        .calendar-grid-wrapper {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            max-width: 340px;
        }

        .day-node-tile {
            aspect-ratio: 1;
            background-color: #f7f5f0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid transparent;
        }

        /* MONTH PERCENT INDEX MATRIX LISTS */
        .index-list-matrix {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .index-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px dashed #f5efe6;
            font-size: 13px;
            font-weight: 600;
        }

        .index-month-name {
            color: #1e293b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .index-month-pct {
            color: #c5a059;
            font-weight: 700;
        }

        /* JOURNAL LOGS CHRONICLER */
        .journal-timeline {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
        }

        .journal-card {
            background: #ffffff;
            border: 1px solid #f5efe6;
            padding: 24px;
            border-radius: 8px;
            border-left: 3px solid #c5a059;
        }

        .journal-card h4 {
            font-size: 12px;
            color: #c5a059;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .journal-card p {
            font-size: 14px;
            line-height: 1.6;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="brand-section">
                <h1 id="workspaceTitle">CHAHAT'S VAULT</h1>
                <p>Royal Minimalism // Matrix</p>
            </div>
            
            <div class="nav-links">
                <a href="index.html" class="nav-item">✦ DAILY CONSOLE</a>
                <a href="archive.html" class="nav-item active">✦ ARCHIVE MATRIX</a>
            </div>
        </div>
        
        <button class="reset-btn" onclick="triggerMasterWipe()">⚠️ Reset Master Ledger</button>
    </div>

    <div class="main-content">
        <div class="header-title">Historical Progress & Archives</div>

        <div class="month-selector-bar" id="monthSelectorContainer">
            </div>

        <div class="vault-split-layout">
            <div class="surface-panel">
                <div class="panel-meta-label" id="gridPanelLabel">Localized Day Matrix Configuration</div>
                <div class="calendar-grid-wrapper" id="calendarGridApparatus"></div>
            </div>

            <div class="surface-panel">
                <div class="panel-meta-label">Annual Sovereign Efficiency Index</div>
                <div class="index-list-matrix" id="macroIndexContainer">
                    </div>
            </div>
        </div>

        <div class="surface-panel">
            <div class="panel-meta-label">Archived Reflection Chronicles</div>
            <div class="journal-timeline" id="journalTimelineBox"></div>
        </div>
    </div>

    <script>
        const monthNamesArray = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const monthDaysMap = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]; // Standard Year layout (Adjustable to 366 for leap loops)
        
        let currentActiveMonthIndex = new Date().getMonth();

        // Read core master data shared from index.html
        let masterLedger = JSON.parse(localStorage.getItem('quantum_royal_ledger')) || {
            habitNames: [],
            currentChecks: [],
            monthlyLogs: {}
        };

        function initArchiveApparatus() {
            renderMonthSelectors();
            renderCalendarGrid();
            renderMacroTextIndex();
            renderJournalTimeline();
            
            // Mirror header preference
            document.getElementById('workspaceTitle').innerText = localStorage.getItem('quantum_royal_title') || "CHAHAT'S VAULT";
        }

        function renderMonthSelectors() {
            const bar = document.getElementById('monthSelectorContainer');
            bar.innerHTML = "";
            monthNamesArray.forEach((name, idx) => {
                let tab = document.createElement('div');
                tab.className = `month-tab ${idx === currentActiveMonthIndex ? 'active-month' : ''}`;
                tab.innerText = name.substring(0, 3);
                tab.onclick = () => {
                    currentActiveMonthIndex = idx;
                    renderMonthSelectors();
                    renderCalendarGrid();
                };
                bar.appendChild(tab);
            });
        }

        function renderCalendarGrid() {
            const grid = document.getElementById('calendarGridApparatus');
            const label = document.getElementById('gridPanelLabel');
            grid.innerHTML = "";
            
            label.innerText = `${monthNamesArray[currentActiveMonthIndex]} Target Matrix Day Grid`;

            // Calculate start day offset for the index matrix map mapping
            let dayOffset = 0;
            for(let m = 0; m < currentActiveMonthIndex; m++) {
                dayOffset += monthDaysMap[m];
            }

            let totalDaysInMonth = monthDaysMap[currentActiveMonthIndex];

            for(let d = 1; d <= totalDaysInMonth; d++) {
                let dayOfYearIndex = dayOffset + d;
                let tile = document.createElement('div');
                tile.className = 'day-node-tile';
                tile.innerText = d;

                // Check historical values from data ledger mapping loop
                if(masterLedger.monthlyLogs[dayOfYearIndex] !== undefined) {
                    let dataNode = masterLedger.monthlyLogs[dayOfYearIndex];
                    tile.title = `Efficiency: ${dataNode.score}%`;
                    
                    if(dataNode.score === 100) {
                        tile.style.backgroundColor = '#c5a059'; // Full gold royalty
                        tile.style.color = '#ffffff';
                    } else if(dataNode.score >= 66) {
                        tile.style.backgroundColor = '#dfcc9e'; // Metallic medium gold
                        tile.style.color = '#1e293b';
                    } else if(dataNode.score >= 33) {
                        tile.style.backgroundColor = '#eedfbf'; // Soft champagne tint
                        tile.style.color = '#475569';
                    } else {
                        tile.style.backgroundColor = '#f4ebd4'; // Soft linen hint
                        tile.style.color = '#64748b';
                    }
                    tile.style.borderColor = '#c5a059';
                }
                grid.appendChild(tile);
            }
        }

        function renderMacroTextIndex() {
            const container = document.getElementById('macroIndexContainer');
            container.innerHTML = "";

            let globalDayOffset = 0;

            monthNamesArray.forEach((monthName, mIdx) => {
                let totalDays = monthDaysMap[mIdx];
                let loggedDaysInMonthCount = 0;
                let collectiveScoreSum = 0;

                for(let d = 1; d <= totalDays; d++) {
                    let dayIndex = globalDayOffset + d;
                    if(masterLedger.monthlyLogs[dayIndex] !== undefined) {
                        loggedDaysInMonthCount++;
                        collectiveScoreSum += masterLedger.monthlyLogs[dayIndex].score;
                    }
                }

                let displayPercentageText = "0%";
                if(loggedDaysInMonthCount > 0) {
                    displayPercentageText = `${Math.round(collectiveScoreSum / loggedDaysInMonthCount)}%`;
                }

                let row = document.createElement('div');
                row.className = 'index-item-row';
                row.innerHTML = `
                    <span class="index-month-name">${monthName}</span>
                    <span class="index-month-pct">${displayPercentageText} Operational Output</span>
                `;
                container.appendChild(row);

                globalDayOffset += totalDays;
            });
        }

        function renderJournalTimeline() {
            const timeline = document.getElementById('journalTimelineBox');
            timeline.innerHTML = "";

            let globalDayIndexKeys = Object.keys(masterLedger.monthlyLogs).sort((a, b) => b - a);

            if(globalDayIndexKeys.length === 0) {
                timeline.innerHTML = `<p style="font-size: 13px; color: #94a3b8; font-style: italic;">No reflection chronicles archived in this ledger configuration loop yet.</p>`;
                return;
            }

            globalDayIndexKeys.forEach(key => {
                let dataNode = masterLedger.monthlyLogs[key];
                
                // Approximate reverse lookup metric label logic for visual representation without listing concrete static dates
                let card = document.createElement('div');
                card.className = 'journal-card';
                card.innerHTML = `
                    <h4>Chronicle Log Ref ID: #${key} // Output Ratio: ${dataNode.score}%</h4>
                    <p>${dataNode.note}</p>
                `;
                timeline.appendChild(card);
            });
        }

        function triggerMasterWipe() {
            if(confirm("Are you entirely sure you want to clear this ledger back to absolute zero? This wipes your calendar grid allocations, text logs, and custom habit structures from memory forever.")) {
                localStorage.removeItem('quantum_royal_ledger');
                localStorage.removeItem('quantum_royal_title');
                location.reload();
            }
        }

        initArchiveApparatus();
    </script>
</body>
</html>
